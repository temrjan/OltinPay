services:
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--log.level=WARN"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=web"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme.json
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.secure.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.ratelimit.ratelimit.burst=50"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: oltinchain
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  oltinchain-api:
    build: ./oltinchain-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${PG_PASSWORD}@postgres:5432/oltinchain
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ZKSYNC_RPC_URL: ${ZKSYNC_RPC_URL}
      OLTIN_CONTRACT_ADDRESS: ${OLTIN_CONTRACT_ADDRESS}
      MINTER_PRIVATE_KEY: ${MINTER_PRIVATE_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # WebSocket router - no rate limit
      - "traefik.http.routers.oltin-ws.rule=Host(`api.${DOMAIN}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.oltin-ws.entrypoints=websecure"
      - "traefik.http.routers.oltin-ws.tls.certresolver=le"
      - "traefik.http.routers.oltin-ws.middlewares=secure"
      - "traefik.http.routers.oltin-ws.priority=100"
      # HTTP API router - with rate limit
      - "traefik.http.routers.oltin-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.oltin-api.entrypoints=websecure"
      - "traefik.http.routers.oltin-api.tls.certresolver=le"
      - "traefik.http.routers.oltin-api.middlewares=secure,ratelimit"
      - "traefik.http.routers.oltin-api.priority=1"
      - "traefik.http.routers.oltin-dev.rule=Host(`dev.${DOMAIN}`)"
      - "traefik.http.routers.oltin-dev.entrypoints=websecure"
      - "traefik.http.routers.oltin-dev.tls.certresolver=le"
      - "traefik.http.routers.oltin-dev.middlewares=secure"
      - "traefik.http.services.oltin-api.loadbalancer.server.port=8000"

  oltinchain-dashboard:
    build:
      context: ./oltinchain-dashboard
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        NEXT_PUBLIC_WS_URL: wss://api.${DOMAIN}/ws
    restart: unless-stopped
    networks:
      - web
    depends_on:
      - oltinchain-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oltin-dashboard.rule=Host(`dashboard.${DOMAIN}`)"
      - "traefik.http.routers.oltin-dashboard.entrypoints=websecure"
      - "traefik.http.routers.oltin-dashboard.tls.certresolver=le"
      - "traefik.http.routers.oltin-dashboard.middlewares=secure"
      - "traefik.http.services.oltin-dashboard.loadbalancer.server.port=3000"
      - "traefik.http.routers.oltin-trade.rule=Host(`${DOMAIN}`) && PathPrefix(`/trade`)"
      - "traefik.http.routers.oltin-trade.entrypoints=websecure"
      - "traefik.http.routers.oltin-trade.tls.certresolver=le"
      - "traefik.http.routers.oltin-trade.middlewares=secure"
      - "traefik.http.routers.oltin-trade.service=oltin-dashboard"
      - "traefik.http.routers.oltin-trade.priority=10"
      # Static assets for trade page
      - "traefik.http.routers.oltin-trade-next.rule=Host(`${DOMAIN}`) && PathPrefix(`/_next`)"
      - "traefik.http.routers.oltin-trade-next.entrypoints=websecure"
      - "traefik.http.routers.oltin-trade-next.tls.certresolver=le"
      - "traefik.http.routers.oltin-trade-next.service=oltin-dashboard"
      - "traefik.http.routers.oltin-trade-next.priority=10"

  oltinchain-webapp:
    build:
      context: ./oltinchain-webapp
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    restart: unless-stopped
    networks:
      - web
    depends_on:
      - oltinchain-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oltin-webapp.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.oltin-webapp.entrypoints=websecure"
      - "traefik.http.routers.oltin-webapp.tls.certresolver=le"
      - "traefik.http.routers.oltin-webapp.middlewares=secure"
      - "traefik.http.routers.oltin-webapp.priority=100"
      - "traefik.http.services.oltin-webapp.loadbalancer.server.port=3000"

  oltinchain-bots:
    build: ./oltinchain-bots
    restart: unless-stopped
    environment:
      BOT_API_BASE_URL: http://oltinchain-api:8000
      BOT_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - internal
    depends_on:
      - oltinchain-api
    profiles:
      - bots

  landing:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./landing:/usr/share/nginx/html:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=le"
      - "traefik.http.routers.landing.middlewares=secure"
      - "traefik.http.routers.landing.priority=1"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

  oltinchain-bots-v3:
    build: ./oltinchain-bots-v3
    restart: unless-stopped
    environment:
      API_BASE_URL: http://oltinchain-api:8000
      BOT_PASSWORD: bot123
      CYCLE_INTERVAL: 45
      ORDER_TTL: 300
      DATABASE_URL: postgresql://postgres:${PG_PASSWORD}@postgres:5432/oltinchain
    networks:
      - internal
    depends_on:
      - oltinchain-api

  oltinchain-miniapp-bot:
    build: ./oltinchain-miniapp-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WEBAPP_URL=https://app.${DOMAIN}
    networks:
      - web

  # ═══════════════════════════════════════════════════════════════════
  # OltinPay Services (oltinpay.com)
  # ═══════════════════════════════════════════════════════════════════

  oltinpay-api:
    build: ./oltinpay/oltinpay-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${PG_PASSWORD}@postgres:5432/oltinpay
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - TELEGRAM_BOT_TOKEN=${OLTINPAY_BOT_TOKEN:-dummy_token}
      - ZNAI_CLOUD_URL=${ZNAI_CLOUD_URL:-}
      - ZNAI_CLOUD_API_KEY=${ZNAI_CLOUD_API_KEY:-}
      - CORS_ORIGINS_STR=https://app.oltinpay.com,http://localhost:3000
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oltinpay-api.rule=Host(`api.oltinpay.com`)"
      - "traefik.http.routers.oltinpay-api.entrypoints=websecure"
      - "traefik.http.routers.oltinpay-api.tls.certresolver=le"
      - "traefik.http.routers.oltinpay-api.middlewares=secure,ratelimit"
      - "traefik.http.services.oltinpay-api.loadbalancer.server.port=8000"

  oltinpay-webapp:
    build:
      context: ./oltinpay/oltinpay-webapp
      args:
        NEXT_PUBLIC_API_URL: https://api.oltinpay.com/api/v1
    restart: unless-stopped
    networks:
      - web
    depends_on:
      - oltinpay-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oltinpay-webapp.rule=Host(`app.oltinpay.com`)"
      - "traefik.http.routers.oltinpay-webapp.entrypoints=websecure"
      - "traefik.http.routers.oltinpay-webapp.tls.certresolver=le"
      - "traefik.http.routers.oltinpay-webapp.middlewares=secure"
      - "traefik.http.services.oltinpay-webapp.loadbalancer.server.port=3000"

  oltinpay-bot:
    build: ./oltinpay/oltinpay-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${OLTINPAY_BOT_TOKEN}
      - WEBAPP_URL=https://app.oltinpay.com
    networks:
      - web

volumes:
  pg_data:
  redis_data:

networks:
  web:
    name: web
  internal:
    name: internal
    internal: true
