services:
  postgres:
    image: postgres:16-alpine
    container_name: oltinpay-postgres
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: oltinpay
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oltinpay-redis
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  oltinpay-api:
    build: ./oltinpay/oltinpay-api
    container_name: oltinpay-api
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    mem_limit: 512m
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${PG_PASSWORD}@postgres:5432/oltinpay
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PRIVATE_KEY=${ADMIN_PRIVATE_KEY}
      - TELEGRAM_BOT_TOKEN=${OLTINPAY_BOT_TOKEN:-dummy_token}
      - ZNAI_CLOUD_URL=${ZNAI_CLOUD_URL:-}
      - ZNAI_CLOUD_API_KEY=${ZNAI_CLOUD_API_KEY:-}
      - CORS_ORIGINS_STR=https://app.oltinpay.com,http://localhost:3000
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  oltinpay-webapp:
    build:
      context: ./oltinpay/oltinpay-webapp
      args:
        NEXT_PUBLIC_API_URL: https://api.oltinpay.com/api/v1
    container_name: oltinpay-webapp
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    mem_limit: 256m
    networks:
      - proxy
    depends_on:
      - oltinpay-api

  oltinpay-bot:
    build: ./oltinpay/oltinpay-bot
    container_name: oltinpay-bot
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    mem_limit: 128m
    environment:
      - TELEGRAM_BOT_TOKEN=${OLTINPAY_BOT_TOKEN}
      - WEBAPP_URL=https://app.oltinpay.com
    networks:
      - internal

volumes:
  pg_data:
  redis_data:

networks:
  proxy:
    external: true
  internal:
