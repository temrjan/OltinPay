name: Deploy to 7demo

# Manual-only for now (2026-07-18). Auto-deploy on push is disabled because:
#   1. DEPLOY_* secrets were never configured — every push-triggered run
#      failed at `ssh-keyscan -H ""` since April.
#   2. The live demo stack actually runs from /opt/oltinchain (hand-assembled,
#      not a git clone), whose containers already own the names oltinpay-api
#      and oltinpay-webapp. A deploy into /opt/oltinpay as written below would
#      collide with them and could take the live vitrina down.
# Re-enable the push trigger only after the server is migrated to the
# git-driven /opt/oltinpay stack and the secrets are set in the
# `production` environment.
on:
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" bash <<'EOF'
          set -euo pipefail
          cd /opt/oltinpay
          git fetch --prune origin
          git reset --hard origin/main
          docker compose pull || true
          docker compose up -d --build
          docker image prune -f || true
          EOF
