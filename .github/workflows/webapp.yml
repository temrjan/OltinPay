name: Webapp (Next.js)

on:
  push:
    branches: [main]
    paths:
      - 'oltinpay/oltinpay-webapp/**'
      - '.github/workflows/webapp.yml'
  pull_request:
    paths:
      - 'oltinpay/oltinpay-webapp/**'
      - '.github/workflows/webapp.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oltinpay/oltinpay-webapp
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oltinpay/oltinpay-webapp/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
