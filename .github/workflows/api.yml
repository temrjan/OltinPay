name: API (Python)

on:
  push:
    branches: [main]
    paths:
      - 'oltinpay/oltinpay-api/**'
      - '.github/workflows/api.yml'
  pull_request:
    paths:
      - 'oltinpay/oltinpay-api/**'
      - '.github/workflows/api.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Real Postgres so the BLOCKER-B1 advisory-lock regression guard
    # (tests/test_concurrency_pg.py) actually runs — it is skipped on SQLite and
    # under no TEST_PG_URL, which is exactly how the race originally shipped.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: oltinpay/oltinpay-api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src/

      - name: Mypy (my modules)
        run: mypy --ignore-missing-imports src/infrastructure/ src/balances/ src/bank/ src/por/ src/withdrawals/ src/indexer/ src/deposits/ src/welcome/ src/users/schemas.py src/users/router.py src/users/service.py src/main.py

      # Full suite — NEVER a pinned file list (new test files must gate CI
      # automatically; a pinned list is how test_concurrency_pg / test_deposits
      # went ungated). conftest builds an in-memory SQLite for the unit tests;
      # TEST_PG_URL points the PG-only tests at the service container above.
      - name: Pytest (full suite)
        env:
          SECRET_KEY: ci-test-secret
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          TEST_PG_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest -q
